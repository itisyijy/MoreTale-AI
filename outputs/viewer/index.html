<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoreTale Story Viewer</title>
    <link rel="stylesheet" href="/viewer/styles.css?v=20260401-1" />
  </head>
  <body>
    <main class="viewer-shell">
      <header class="viewer-header">
        <div class="brand-block">
          <h1 id="book-title" class="book-title">
            <svg
              class="brand-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M3 6.75C3 5.50736 4.00736 4.5 5.25 4.5H10.5C11.7426 4.5 12.75 5.50736 12.75 6.75V18.75C12.75 17.5074 11.7426 16.5 10.5 16.5H5.25C4.00736 16.5 3 17.5074 3 18.75V6.75Z"
                stroke="currentColor"
                stroke-width="1.9"
                stroke-linejoin="round"
              />
              <path
                d="M21 6.75C21 5.50736 19.9926 4.5 18.75 4.5H13.5C12.2574 4.5 11.25 5.50736 11.25 6.75V18.75C11.25 17.5074 12.2574 16.5 13.5 16.5H18.75C19.9926 16.5 21 17.5074 21 18.75V6.75Z"
                stroke="currentColor"
                stroke-width="1.9"
                stroke-linejoin="round"
              />
            </svg>
            <span>숲 속 친구들의 모험</span>
          </h1>
          <p id="book-subtitle" class="book-subtitle">Forest Friends' Adventure</p>
        </div>

        <div class="top-controls">
          <div class="menu-bar" aria-label="상단 메뉴">
            <section class="menu-group menu-group--language" aria-label="언어 설정">
              <p class="menu-label">언어</p>
              <div class="language-switch" role="tablist" aria-label="언어 선택">
                <button id="mode-primary" class="lang-btn" type="button" role="tab" aria-selected="false">
                  <span class="lang-code">KR</span>
                  <span id="mode-primary-label">한국어</span>
                </button>
                <button id="mode-secondary" class="lang-btn active" type="button" role="tab" aria-selected="true">
                  <span class="lang-code">GB</span>
                  <span id="mode-secondary-label">English</span>
                </button>
                <button id="mode-both" class="lang-btn" type="button" role="tab" aria-selected="false">
                  <span class="lang-code">🌍</span>
                  <span>둘 다 / Both</span>
                </button>
              </div>
            </section>

            <section class="menu-group menu-group--selection" aria-label="스토리 선택">
              <p class="menu-label">이동</p>
              <div class="select-cluster">
                <label class="run-picker" for="run-select">
                  <span>Run</span>
                  <select id="run-select"></select>
                </label>

                <label class="page-picker" for="page-select">
                  <span>Page</span>
                  <select id="page-select" disabled>
                    <option value="">페이지 선택</option>
                  </select>
                </label>
              </div>
            </section>

            <section class="menu-group menu-group--actions" aria-label="뷰어 도구">
              <p class="menu-label">도구</p>
              <div class="action-cluster">
                <button id="autoplay-toggle" class="autoplay-toggle" type="button" disabled>
                  자동재생 시작
                </button>

                <button id="sound-toggle" class="sound-toggle" type="button">소리 켬</button>

                <a
                  id="print-view-link"
                  class="print-view-link"
                  href="/viewer/print.html"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  책 PDF 화면
                </a>

                <a
                  id="quiz-view-link"
                  class="quiz-view-link"
                  href="/viewer/quiz.html"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  퀴즈 화면
                </a>
              </div>
            </section>
          </div>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
      </header>

      <section id="page-view" class="page-view hidden">
        <article id="page-card" class="page-card">
          <section class="illustration-pane">
            <div id="page-badge" class="page-badge">1</div>
            <div id="illustration-wrap" class="illustration-wrap"></div>
          </section>

          <section class="story-pane">
            <div class="story-head">
              <span id="active-language-pill" class="language-pill">English</span>
              <div class="play-controls">
                <button id="play-btn" class="play-btn" type="button" aria-label="현재 페이지 음성 재생">
                  ▶
                </button>
                <button id="play-primary-btn" class="dual-play-btn hidden" type="button" aria-label="원문 오디오 재생">
                  KR ▶
                </button>
                <button id="play-secondary-btn" class="dual-play-btn hidden" type="button" aria-label="번역문 오디오 재생">
                  EN ▶
                </button>
              </div>
            </div>
            <div id="story-text" class="story-text"></div>
          </section>
        </article>

        <nav class="page-nav" aria-label="페이지 이동">
          <button id="prev-btn" class="nav-btn" type="button" aria-label="이전 페이지">‹</button>
          <div id="page-dots" class="page-dots"></div>
          <button id="next-btn" class="nav-btn" type="button" aria-label="다음 페이지">›</button>
        </nav>

        <p id="page-indicator" class="page-indicator" aria-live="polite">1 / 1</p>
      </section>

      <audio id="speech-audio" class="hidden-audio" preload="none"></audio>
    </main>

    <script src="/viewer/app.js?v=20260401-1" defer></script>
  </body>
</html>
